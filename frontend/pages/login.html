<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanBot - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at top, #1a1a4e 0%, #0f0f2d 50%, #000010 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .card-login {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 24px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        .card-login::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, #22d3ee, #a855f7, #c026d3);
            border-radius: 24px 24px 0 0;
        }

        .logo-small {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        .titulo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(90deg, #22d3ee, #a855f7, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitulo {
            text-align: center;
            color: #67e8f9;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-label {
            color: #c4b5fd;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 12px;
            color: white;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(34, 211, 238, 0.05);
            border-color: #22d3ee;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
            color: white;
            outline: none;
        }

        .form-control::placeholder { color: #6b7280; }

        .input-group-text {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-right: none;
            color: #22d3ee;
            border-radius: 12px 0 0 12px;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }

        .btn-ingresar {
            background: linear-gradient(135deg, #0891b2, #22d3ee);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(34, 211, 238, 0.3);
            margin-top: 10px;
        }

        .btn-ingresar:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(34, 211, 238, 0.5);
        }

        .btn-ingresar:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .link-registro {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .link-registro a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 500;
        }

        .link-registro a:hover { color: #c084fc; }

        .link-invitado {
            text-align: center;
            margin-top: 12px;
        }

        .link-invitado a {
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .link-invitado a:hover { color: #9ca3af; }

        .alerta {
            border-radius: 12px;
            font-size: 14px;
            padding: 12px 15px;
            margin-bottom: 20px;
            display: none;
        }

        .alerta-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alerta-exito {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .mb-3 { margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card-login">
        <img src="../../images/logo.png" alt="FinanBot" class="logo-small"
             onerror="this.style.display='none'">

        <h1 class="titulo">Bienvenido de nuevo</h1>
        <p class="subtitulo">Ingresa a tu cuenta de FinanBot</p>

        <div class="alerta alerta-error" id="alertaError">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span id="mensajeError"></span>
        </div>
        <div class="alerta alerta-exito" id="alertaExito">
            <i class="fas fa-check-circle me-2"></i>
            <span id="mensajeExito"></span>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fas fa-envelope me-1"></i> Correo electrónico</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control" id="correo"
                       placeholder="tu@correo.com">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fas fa-lock me-1"></i> Contraseña</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="contrasena"
                       placeholder="Tu contraseña">
            </div>
        </div>

        <button class="btn-ingresar" id="btnIngresar" onclick="login()">
            <i class="fas fa-sign-in-alt me-2"></i> Ingresar
        </button>

        <div class="link-registro">
            ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
        </div>

        <div class="link-invitado">
            <a href="chat.html?invitado=true">
                <i class="fas fa-robot me-1"></i> Continuar sin registrarse
            </a>
        </div>
    </div>

    <script>
        async function login() {
            const correo = document.getElementById('correo').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            const btn = document.getElementById('btnIngresar');

            document.getElementById('alertaError').style.display = 'none';
            document.getElementById('alertaExito').style.display = 'none';

            if (!correo || !contrasena) {
                mostrarError('Correo y contraseña son obligatorios.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Ingresando...';

            try {
                const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, contrasena })
                });

                const data = await response.json();

 if (response.ok) {
    localStorage.setItem('token', data.token);
    localStorage.setItem('usuario', JSON.stringify(data.usuario));

    mostrarExito('¡Bienvenido ' + data.usuario.nombre + '! Redirigiendo...');

    setTimeout(async () => {
        // Verificar onboarding en MySQL
        const resPerfil = await fetch('http://127.0.0.1:5000/api/perfil/', {
            headers: { 'Authorization': `Bearer ${data.token}` }
        });
        const perfil = await resPerfil.json();

        if (perfil.onboarding_completado) {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'onboarding.html';
        }
    }, 1500);

                } else {
                    mostrarError(data.mensaje || 'Correo o contraseña incorrectos.');
                }
            } catch (error) {
                mostrarError('No se pudo conectar con el servidor. Verifica que Flask esté corriendo.');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> Ingresar';
        }

        function mostrarError(msg) {
            document.getElementById('mensajeError').textContent = msg;
            document.getElementById('alertaError').style.display = 'block';
        }

        function mostrarExito(msg) {
            document.getElementById('mensajeExito').textContent = msg;
            document.getElementById('alertaExito').style.display = 'block';
        }

        // Enter para hacer login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
