<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanBot - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <!-- reCAPTCHA v2 -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cyan:   #22d3ee;
            --cyan2:  #0891b2;
            --purple: #a855f7;
            --rose:   #c026d3;
            --green:  #4ade80;
            --red:    #f87171;
            --muted:  #6b7280;
            --second: #9ca3af;
            --bg:     #05030f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 30% 0%, #0f1a3a 0%, #0a0a20 45%, var(--bg) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ── FONDO ─────────────────────────────────────── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(circle at 15% 25%, rgba(34,211,238,0.07) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(168,85,247,0.07) 0%, transparent 45%);
        }
        /* Grid punteado sutil */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(rgba(34,211,238,0.05) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* Orbe animado */
        .orb {
            position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
            animation: orbDrift 16s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; top: -200px; right: -160px; background: radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 70%); animation-delay: 0s; }
        .orb-2 { width: 380px; height: 380px; bottom: -140px; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.10) 0%, transparent 70%); animation-delay: -7s; }
        @keyframes orbDrift {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(20px,-30px); }
        }

        /* ── CARD ───────────────────────────────────────── */
        .card-login {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(34,211,238,0.22);
            border-radius: 26px;
            padding: 44px 38px 38px;
            backdrop-filter: blur(24px);
            box-shadow: 0 28px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(34,211,238,0.06);
        }
        /* Línea superior degradada */
        .card-login::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #22d3ee, #a855f7, #c026d3, transparent);
            border-radius: 26px 26px 0 0;
        }

        /* ── LOGO ───────────────────────────────────────── */
        .logo-wrap {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 26px;
        }
        .logo-img {
            width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(34,211,238,0.3);
            box-shadow: 0 0 24px rgba(34,211,238,0.35), 0 0 48px rgba(34,211,238,0.12);
            margin-bottom: 14px;
        }
        .logo-fallback {
            width: 70px; height: 70px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(8,145,178,0.3), rgba(168,85,247,0.25));
            border: 2px solid rgba(34,211,238,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin-bottom: 14px;
            box-shadow: 0 0 24px rgba(34,211,238,0.3);
        }
        .titulo {
            font-family: 'Segoe UI', sans-serif; font-size: 26px; font-weight: 800;
            background: linear-gradient(90deg, #22d3ee, #a855f7, #c026d3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px; text-align: center; letter-spacing: -0.3px;
        }
        .subtitulo { text-align: center; color: #67e8f9; font-size: 13px; }

        /* ── ALERTAS ────────────────────────────────────── */
        .alerta {
            padding: 12px 16px; border-radius: 12px; margin-bottom: 20px;
            font-size: 13px; display: none; align-items: center; gap: 9px;
        }
        .alerta.visible { display: flex; animation: slideDown .3s ease; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        .alerta-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .alerta-exito { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); color: #86efac; }

        /* ── CAMPOS ─────────────────────────────────────── */
        .campo { margin-bottom: 18px; }
        .campo-label {
            display: block; font-size: 11px; font-weight: 700;
            color: #a5f3fc; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px;
        }
        .campo-row { display: flex; }
        .campo-prefix {
            width: 44px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(34,211,238,0.09); border: 1.5px solid rgba(34,211,238,0.25);
            border-right: none; border-radius: 12px 0 0 12px; color: var(--cyan); font-size: 13px;
        }
        .campo-input {
            flex: 1; background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(34,211,238,0.22); border-left: none;
            border-radius: 0 12px 12px 0;
            color: white; padding: 12px 15px; font-size: 14px; outline: none;
            transition: all .3s; font-family: 'Segoe UI', sans-serif;
        }
        .campo-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(34,211,238,0.12); background: rgba(34,211,238,0.04); }
        .campo-input::placeholder { color: var(--muted); }
        .campo-input.con-ojo { border-radius: 0; }

        .ojo-btn {
            background: rgba(34,211,238,0.09); border: 1.5px solid rgba(34,211,238,0.22);
            border-left: none; border-radius: 0 12px 12px 0;
            color: var(--muted); padding: 0 14px; cursor: pointer; transition: all .3s;
            display: flex; align-items: center; font-size: 14px;
        }
        .ojo-btn:hover { color: var(--cyan); background: rgba(34,211,238,0.15); }

        /* ── OLVIDÉ CONTRASEÑA ─────────────────────────── */
        .link-olvide {
            display: block; text-align: left; font-size: 12px; color: var(--cyan);
            text-decoration: none; margin-top: -10px; margin-bottom: 20px;
            transition: color .3s; font-weight: 600;
        }
        .link-olvide:hover { color: #67e8f9; }

        /* ── BOTÓN INGRESAR ─────────────────────────────── */
        .btn-login {
            width: 100%; border: none; border-radius: 12px; padding: 14px;
            font-size: 15px; font-weight: 700; color: white; cursor: pointer;
            background: linear-gradient(135deg, #0891b2, #22d3ee);
            box-shadow: 0 6px 24px rgba(34,211,238,0.32);
            transition: all .3s; display: flex; align-items: center; justify-content: center;
            gap: 9px; font-family: 'Segoe UI', sans-serif; margin-bottom: 20px;
        }
        .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 34px rgba(34,211,238,0.52); }
        .btn-login:disabled { opacity: .65; cursor: not-allowed; transform: none; }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── LINKS INFERIORES ───────────────────────────── */
        .sep { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 18px; }
        .link-registro { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
        .link-registro a { color: var(--purple); text-decoration: none; font-weight: 600; transition: color .3s; }
        .link-registro a:hover { color: #c084fc; }
        .link-invitado { text-align: center; }
        .link-invitado a { color: #374151; font-size: 12px; text-decoration: none; transition: color .3s; }
        .link-invitado a:hover { color: var(--second); }

        /* ══════════════════════════════════════════════════
           MODAL OLVIDÉ CONTRASEÑA
        ══════════════════════════════════════════════════ */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.visible { display: flex; }

        .modal-box {
            background: linear-gradient(145deg, #0d0d28, #080818);
            border: 1px solid rgba(168,85,247,0.28);
            border-radius: 24px; padding: 36px 32px; width: 100%; max-width: 430px;
            position: relative;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(168,85,247,0.1);
            animation: modalIn .35s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
        .modal-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #c026d3, #a855f7, #22d3ee, transparent);
            border-radius: 24px 24px 0 0;
        }

        .modal-close {
            position: absolute; top: 16px; right: 18px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: var(--second); width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px; transition: all .3s;
        }
        .modal-close:hover { background: rgba(239,68,68,0.18); color: #ef4444; }

        /* Stepper del modal */
        .modal-stepper { display: flex; align-items: center; gap: 0; margin-bottom: 28px; }
        .ms-item { display: flex; align-items: center; gap: 0; flex: 1; }
        .ms-item:last-child { flex: none; }
        .ms-circle {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; transition: all .4s;
            border: 2px solid rgba(168,85,247,0.2); color: var(--muted);
            font-family: 'Space Mono', monospace;
        }
        .ms-circle.activo { border-color: var(--purple); color: white; background: rgba(168,85,247,0.15); box-shadow: 0 0 12px rgba(168,85,247,0.4); }
        .ms-circle.hecho  { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.1); }
        .ms-line { flex: 1; height: 1px; background: rgba(168,85,247,0.15); transition: background .4s; margin: 0 4px; }
        .ms-line.activa { background: linear-gradient(90deg, var(--green), var(--purple)); }

        .modal-titulo { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: 800; color: white; margin-bottom: 4px; letter-spacing: -0.3px; }
        .modal-sub { font-size: 13px; color: var(--second); margin-bottom: 22px; }

        /* Alertas modal */
        .alerta-modal {
            padding: 11px 14px; border-radius: 11px; font-size: 13px; margin-bottom: 16px;
            display: none; align-items: center; gap: 8px;
        }
        .alerta-modal.visible { display: flex; }
        .alerta-modal-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .alerta-modal-exito { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); color: #86efac; }

        /* Campos modal */
        .m-campo { margin-bottom: 16px; }
        .m-label { display: block; font-size: 11px; font-weight: 700; color: #c4b5fd; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
        .m-input {
            width: 100%; background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(168,85,247,0.22); border-radius: 12px;
            color: white; padding: 12px 15px; font-size: 14px; outline: none;
            transition: all .3s; font-family: 'Segoe UI', sans-serif;
        }
        .m-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.1); background: rgba(168,85,247,0.05); }
        .m-input::placeholder { color: var(--muted); }
        .m-input-row { display: flex; }
        .m-input-row .m-input { border-radius: 12px 0 0 12px; border-right: none; flex: 1; }
        .m-ojo {
            background: rgba(168,85,247,0.08); border: 1.5px solid rgba(168,85,247,0.22);
            border-left: none; border-radius: 0 12px 12px 0;
            color: var(--muted); padding: 0 13px; cursor: pointer; transition: all .3s;
            display: flex; align-items: center; font-size: 13px;
        }
        .m-ojo:hover { color: var(--purple); }

        /* Pregunta box */
        .pregunta-box {
            background: rgba(168,85,247,0.07); border: 1px solid rgba(168,85,247,0.2);
            border-radius: 12px; padding: 14px 16px; font-size: 14px;
            color: #c4b5fd; margin-bottom: 18px; line-height: 1.5;
        }

        /* reCAPTCHA container */
        .recaptcha-wrap {
            margin-bottom: 18px;
            display: flex; justify-content: center;
        }
        /* Estilizar el iframe de reCAPTCHA */
        .recaptcha-wrap .g-recaptcha > div {
            border-radius: 12px; overflow: hidden;
        }

        /* Botón modal */
        .btn-modal {
            width: 100%; border: none; border-radius: 12px; padding: 13px;
            font-size: 14px; font-weight: 700; color: white; cursor: pointer;
            background: linear-gradient(135deg, #c026d3, #a855f7);
            box-shadow: 0 5px 20px rgba(192,38,211,0.3);
            transition: all .3s; display: flex; align-items: center; justify-content: center;
            gap: 8px; font-family: 'Segoe UI', sans-serif;
        }
        .btn-modal:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(192,38,211,0.5); }
        .btn-modal:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        /* Hint match contraseñas */
        .match-hint { font-size: 11px; margin-top: 6px; display: none; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- ════════════════════════════════════════════
         MODAL — OLVIDÉ MI CONTRASEÑA
    ════════════════════════════════════════════ -->
    <div class="modal-overlay" id="modalOlvide">
        <div class="modal-box">
            <button class="modal-close" onclick="cerrarModal()">✕</button>

            <div class="modal-titulo">🔑 Recuperar contraseña</div>
            <div class="modal-sub">Verifica tu identidad en 3 pasos</div>

            <!-- Stepper -->
            <div class="modal-stepper">
                <div class="ms-item">
                    <div class="ms-circle activo" id="ms1">1</div>
                    <div class="ms-line" id="ml1"></div>
                </div>
                <div class="ms-item">
                    <div class="ms-circle" id="ms2">2</div>
                    <div class="ms-line" id="ml2"></div>
                </div>
                <div class="ms-circle" id="ms3">3</div>
            </div>

            <!-- Alertas -->
            <div class="alerta-modal alerta-modal-error" id="alertaResetError"><i class="fas fa-circle-exclamation"></i><span id="txtResetError"></span></div>
            <div class="alerta-modal alerta-modal-exito" id="alertaResetExito"><i class="fas fa-circle-check"></i><span id="txtResetExito"></span></div>

            <!-- PASO 1: Correo + reCAPTCHA -->
            <div id="paso1Reset">
                <div class="m-campo">
                    <label class="m-label"><i class="fas fa-envelope" style="color:var(--purple);margin-right:5px"></i>Correo electrónico</label>
                    <input type="email" class="m-input" id="resetCorreo" placeholder="tu@correo.com">
                </div>

                <!-- reCAPTCHA v2 de Google -->
                <div class="recaptcha-wrap">
                    <div class="g-recaptcha"
                         data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
                         data-theme="dark"
                         data-size="normal">
                    </div>
                </div>
                <!-- NOTA: La sitekey "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" es la clave de TEST de Google.
                     Funciona en cualquier dominio para pruebas. Para producción reemplázala por tu clave real
                     obtenida en https://www.google.com/recaptcha/admin -->

                <button class="btn-modal" onclick="buscarCuenta()">
                    <i class="fas fa-search"></i> Buscar mi cuenta
                </button>
            </div>

            <!-- PASO 2: Pregunta de seguridad -->
            <div id="paso2Reset" style="display:none">
                <div class="pregunta-box" id="preguntaMostrada">🔐 Cargando pregunta...</div>
                <div class="m-campo">
                    <label class="m-label"><i class="fas fa-key" style="color:var(--purple);margin-right:5px"></i>Tu respuesta secreta</label>
                    <input type="text" class="m-input" id="resetRespuesta" placeholder="Escribe tu respuesta">
                </div>
                <button class="btn-modal" onclick="verificarRespuesta()">
                    <i class="fas fa-check"></i> Verificar respuesta
                </button>
            </div>

            <!-- PASO 3: Nueva contraseña -->
            <div id="paso3Reset" style="display:none">
                <div class="m-campo">
                    <label class="m-label"><i class="fas fa-lock" style="color:var(--purple);margin-right:5px"></i>Nueva contraseña</label>
                    <div class="m-input-row">
                        <input type="password" class="m-input" id="resetContrasena" placeholder="Mínimo 6 caracteres" oninput="verificarMatchReset()">
                        <button class="m-ojo" type="button" onclick="togglePwd('resetContrasena',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="m-campo">
                    <label class="m-label"><i class="fas fa-lock" style="color:var(--purple);margin-right:5px"></i>Confirmar contraseña</label>
                    <div class="m-input-row">
                        <input type="password" class="m-input" id="resetConfirmar" placeholder="Repite tu contraseña" oninput="verificarMatchReset()">
                        <button class="m-ojo" type="button" onclick="togglePwd('resetConfirmar',this)"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="match-hint" id="matchReset"></div>
                </div>
                <button class="btn-modal" onclick="resetearContrasena()">
                    <i class="fas fa-key"></i> Cambiar contraseña
                </button>
            </div>

        </div>
    </div>

    <!-- ════════════════════════════════════════════
         CARD LOGIN
    ════════════════════════════════════════════ -->
    <div class="card-login">

        <!-- Logo -->
        <div class="logo-wrap">
            <img src="../../images/logo.png" alt="FinanBot" class="logo-img"
                 onerror="this.outerHTML='<div class=\'logo-fallback\'>🤖</div>'">
            <div class="titulo">Bienvenido de nuevo</div>
            <div class="subtitulo">Ingresa a tu cuenta de FinanBot</div>
        </div>

        <!-- Alertas -->
        <div class="alerta alerta-error" id="alertaError"><i class="fas fa-circle-exclamation"></i><span id="mensajeError"></span></div>
        <div class="alerta alerta-exito" id="alertaExito"><i class="fas fa-circle-check"></i><span id="mensajeExito"></span></div>

        <!-- Correo -->
        <div class="campo">
            <label class="campo-label">Correo electrónico</label>
            <div class="campo-row">
                <div class="campo-prefix"><i class="fas fa-envelope"></i></div>
                <input type="email" id="correo" class="campo-input" placeholder="tu@correo.com"
                       onkeydown="if(event.key==='Enter') login()">
            </div>
        </div>

        <!-- Contraseña -->
        <div class="campo">
            <label class="campo-label">Contraseña</label>
            <div class="campo-row">
                <div class="campo-prefix"><i class="fas fa-lock"></i></div>
                <input type="password" id="contrasena" class="campo-input con-ojo" placeholder="Tu contraseña"
                       onkeydown="if(event.key==='Enter') login()">
                <button class="ojo-btn" type="button" onclick="togglePwd('contrasena',this)">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <!-- Olvidé contraseña -->
        <a href="#" class="link-olvide" onclick="abrirModal(); return false;">
            ¿Olvidaste tu contraseña?
        </a>

        <!-- Botón ingresar -->
        <button class="btn-login" id="btnLogin" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Ingresar
        </button>

        <div class="sep"></div>

        <div class="link-registro">
            ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
        </div>
        <div class="link-invitado" style="margin-top:10px">
            <a href="chat.html?invitado=true">
                <i class="fas fa-robot" style="margin-right:4px"></i> Continuar sin registrarse
            </a>
        </div>
    </div>

    <script>
        // ── TOGGLE OJO ────────────────────────────────
        function togglePwd(id, btn) {
            const inp = document.getElementById(id);
            const ico = btn.querySelector('i');
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            ico.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
            btn.style.color = show ? 'var(--cyan)' : '';
        }

        // ── ALERTAS LOGIN ─────────────────────────────
        function mostrarError(msg) {
            document.getElementById('mensajeError').textContent = msg;
            document.getElementById('alertaError').classList.add('visible');
            document.getElementById('alertaExito').classList.remove('visible');
        }
        function mostrarExito(msg) {
            document.getElementById('mensajeExito').textContent = msg;
            document.getElementById('alertaExito').classList.add('visible');
            document.getElementById('alertaError').classList.remove('visible');
        }

        // ── LOGIN ─────────────────────────────────────
        async function login() {
            const correo    = document.getElementById('correo').value.trim();
            const contrasena= document.getElementById('contrasena').value;
            const btn       = document.getElementById('btnLogin');

            document.getElementById('alertaError').classList.remove('visible');
            document.getElementById('alertaExito').classList.remove('visible');

            if (!correo || !contrasena) { mostrarError('Correo y contraseña son obligatorios.'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Ingresando...';

            try {
                const res  = await fetch('http://127.0.0.1:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, contrasena })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token',   data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    mostrarExito('¡Bienvenido ' + data.usuario.nombre + '! Redirigiendo...');

                    setTimeout(async () => {
                        try {
                            const rp = await fetch('http://127.0.0.1:8000/api/perfil/', {
    headers: { 'Authorization': 'Bearer ' + data.token }
});
                            const perfil = await rp.json();
                            window.location.href = perfil.onboarding_completado ? 'dashboard.html' : 'onboarding.html';
                        } catch {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1500);
                } else {
                    mostrarError(data.mensaje || 'Correo o contraseña incorrectos.');
                }
            } catch {
    mostrarError('No se pudo conectar con el servidor. Verifica que esté en ejecución.');
}

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar';
        }

        // ══════════════════════════════════════════════
        //  MODAL OLVIDÉ MI CONTRASEÑA
        // ══════════════════════════════════════════════
        function abrirModal() {
            document.getElementById('modalOlvide').classList.add('visible');
        }

        function cerrarModal() {
            document.getElementById('modalOlvide').classList.remove('visible');
            // Resetear pasos
            document.getElementById('paso1Reset').style.display = 'block';
            document.getElementById('paso2Reset').style.display = 'none';
            document.getElementById('paso3Reset').style.display = 'none';
            // Limpiar inputs
            ['resetCorreo','resetRespuesta','resetContrasena','resetConfirmar'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            // Limpiar alertas
            document.getElementById('alertaResetError').classList.remove('visible');
            document.getElementById('alertaResetExito').classList.remove('visible');
            // Resetear stepper
            actualizarStepper(1);
            // Reset reCAPTCHA
            if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
        }

        function actualizarStepper(paso) {
            for (let i = 1; i <= 3; i++) {
                const c = document.getElementById('ms' + i);
                c.classList.remove('activo', 'hecho');
                if (i < paso)       { c.classList.add('hecho'); c.innerHTML = '<i class="fas fa-check" style="font-size:10px"></i>'; }
                else if (i === paso) { c.classList.add('activo'); c.textContent = i; }
                else                 { c.textContent = i; }
            }
            for (let i = 1; i <= 2; i++) {
                document.getElementById('ml' + i).classList.toggle('activa', i < paso);
            }
        }

        function mostrarErrorModal(msg) {
            document.getElementById('txtResetError').textContent = msg;
            document.getElementById('alertaResetError').classList.add('visible');
            document.getElementById('alertaResetExito').classList.remove('visible');
        }
        function mostrarExitoModal(msg) {
            document.getElementById('txtResetExito').textContent = msg;
            document.getElementById('alertaResetExito').classList.add('visible');
            document.getElementById('alertaResetError').classList.remove('visible');
        }

        // PASO 1: buscar cuenta con validación de reCAPTCHA
        async function buscarCuenta() {
            const correo = document.getElementById('resetCorreo').value.trim();
            document.getElementById('alertaResetError').classList.remove('visible');

            if (!correo) { mostrarErrorModal('Ingresa tu correo electrónico.'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) { mostrarErrorModal('Ingresa un correo válido.'); return; }

            // Verificar reCAPTCHA
            const recaptchaResp = typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : '';
            if (!recaptchaResp) {
                mostrarErrorModal('Por favor completa la verificación reCAPTCHA.');
                return;
            }

            try {
                const res  = await fetch('http://127.0.0.1:8000/api/auth/obtener-pregunta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, recaptcha: recaptchaResp })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('preguntaMostrada').textContent = '🔐 ' + data.pregunta;
                    document.getElementById('paso1Reset').style.display = 'none';
                    document.getElementById('paso2Reset').style.display = 'block';
                    actualizarStepper(2);
                } else {
                    mostrarErrorModal(data.mensaje || 'No se encontró la cuenta.');
                    if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
                }
            } catch {
                mostrarErrorModal('No se pudo conectar con el servidor.');
            }
        }

        // PASO 2: verificar respuesta de seguridad
        async function verificarRespuesta() {
            const correo   = document.getElementById('resetCorreo').value.trim();
            const respuesta= document.getElementById('resetRespuesta').value.trim();
            document.getElementById('alertaResetError').classList.remove('visible');

            if (!respuesta) { mostrarErrorModal('Escribe tu respuesta de seguridad.'); return; }

            try {
                const res  = await fetch('http://127.0.0.1:8000/api/auth/verificar-seguridad', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, respuesta })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('paso2Reset').style.display = 'none';
                    document.getElementById('paso3Reset').style.display = 'block';
                    actualizarStepper(3);
                } else {
                    mostrarErrorModal(data.mensaje || 'Respuesta incorrecta.');
                }
            } catch {
                mostrarErrorModal('No se pudo conectar con el servidor.');
            }
        }

        // Match de contraseñas en modal
        function verificarMatchReset() {
            const p1   = document.getElementById('resetContrasena').value;
            const p2   = document.getElementById('resetConfirmar').value;
            const hint = document.getElementById('matchReset');
            if (!p2) { hint.style.display = 'none'; return; }
            const ok = p1 === p2;
            hint.style.cssText = 'display:flex;align-items:center;gap:5px;font-size:11px;margin-top:6px;color:' + (ok ? 'var(--green)' : 'var(--red)');
            hint.innerHTML = ok
                ? '<i class="fas fa-check-circle"></i> Las contraseñas coinciden'
                : '<i class="fas fa-times-circle"></i> Las contraseñas no coinciden';
        }

        // PASO 3: resetear contraseña
        async function resetearContrasena() {
            const correo    = document.getElementById('resetCorreo').value.trim();
            const respuesta = document.getElementById('resetRespuesta').value.trim();
            const nueva     = document.getElementById('resetContrasena').value;
            const confirmar = document.getElementById('resetConfirmar').value;
            document.getElementById('alertaResetError').classList.remove('visible');

            if (!nueva || !confirmar) { mostrarErrorModal('Completa todos los campos.'); return; }
            if (nueva.length < 6)     { mostrarErrorModal('La contraseña debe tener mínimo 6 caracteres.'); return; }
            if (nueva !== confirmar)   { mostrarErrorModal('Las contraseñas no coinciden.'); return; }

            try {
                const res  = await fetch('http://127.0.0.1:8000/api/auth/resetear-contrasena', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, respuesta, nueva_contrasena: nueva })
                });
                const data = await res.json();

                if (res.ok) {
                    mostrarExitoModal('✅ Contraseña cambiada. Ya puedes iniciar sesión.');
                    setTimeout(() => cerrarModal(), 3000);
                } else {
                    mostrarErrorModal(data.mensaje || 'Error al cambiar la contraseña.');
                }
            } catch {
                mostrarErrorModal('No se pudo conectar con el servidor.');
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
